<!doctype html>
<html lang="hu">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Törtek – 7. osztály</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#dfe5e8;font-family:Arial,sans-serif;color:#18212a}
.page{width:210mm;min-height:297mm;margin:20px auto;background:#fff;padding:13mm;box-shadow:0 4px 20px #0002}
h1{text-align:center;color:#155a8a;margin:0;font-size:26px}.sub{text-align:center;color:#555;margin:6px 0 16px}
.toolbar,.actions{text-align:center;margin:14px 0}.toolbar select,button{padding:10px 13px;font-size:15px;border-radius:9px;border:1px solid #aaa}
button{font-weight:bold;cursor:pointer;margin:3px}.blue{background:#1769aa;color:#fff;border:0}.dark{background:#555;color:#fff;border:0}
.student{display:flex;justify-content:space-between;gap:20px;margin:18px 0}.student input{border:0;border-bottom:1px solid #555;font-size:16px;width:210px}
.info{background:#f2f8fb;border:1px solid #8eb1c7;padding:10px;margin-bottom:10px}
.task{border-top:1px solid #bbb;padding:14px 0;break-inside:avoid}.q{font-weight:bold;font-size:18px;margin-bottom:9px}
input.ans,select.ans{height:38px;border:1.5px solid #666;border-radius:6px;font-size:17px;text-align:center;padding:4px}
.small{width:62px}.medium{width:135px}.wide{width:250px}.row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ok{background:#dff5e4!important;border-color:#198754!important}.bad{background:#fde2e2!important;border-color:#c62828!important}
.fb{font-weight:bold;margin-left:8px}.score{text-align:center;font-size:21px;font-weight:bold;margin:15px}.hint{font-size:13px;color:#666;margin-top:6px}
@media(max-width:850px){body{background:#fff}.page{width:100%;min-height:100vh;margin:0;padding:16px;box-shadow:none}.student{flex-direction:column;gap:10px}.wide{width:210px}}
@media print{body{background:#fff}.page{width:100%;margin:0;box-shadow:none;padding:9mm}.toolbar,.actions,.score{display:none}}
</style></head>
<body><main class="page">
<h1>TÖRTEK ÉS RACIONÁLIS SZÁMOK</h1>
<div class="sub">7. osztály – interaktív A4-es gyakorló feladatlap</div>
<div class="toolbar"><select id="level"><option value="easy">Könnyű</option><option value="medium">Közepes</option><option value="hard">Nehéz</option><option value="mixed" selected>Vegyes gyakorlás</option></select> <button class="blue" onclick="generate()">Új feladatlap</button></div>
<div class="student"><label>Név: <input></label><label>Dátum: <input></label></div>
<div class="info">Oldd meg a feladatokat! A feladatsor minden újrageneráláskor más számokat ad.</div>
<div id="tasks"></div>
<div class="actions"><button class="blue" onclick="checkAll()">✓ Ellenőrzés</button><button class="dark" onclick="generate()">↻ Másik feladatsor</button><button onclick="window.print()">🖨 Nyomtatás</button></div>
<div id="score" class="score"></div>
</main>
<script>
let DATA=[];
const rnd=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const gcd=(a,b)=>b?gcd(b,a%b):Math.abs(a);
const simp=(n,d)=>{let g=gcd(n,d);return[n/g,d/g]};
const id=()=>DATA.length;
function input(name,cl="medium",type="text"){return `<input class="ans ${cl}" id="${name}" type="${type}" inputmode="${type==="number"?"decimal":"text"}">`}
function add(type,ans,title,body,hint=""){let i=DATA.length;DATA.push({type,ans});return `<section class="task"><div class="q">${i+1}. ${title}</div>${body}${hint?`<div class="hint">${hint}</div>`:""}<span class="fb" id="fb${i}"></span></section>`}
function compare(){let b=rnd(2,12),d=rnd(2,12),a=rnd(1,b*2),c=rnd(1,d*2);while(a*d===c*b)c=rnd(1,d*2);let i=id();return add("text",a*d>c*b?">":"<","Hasonlítsd össze a törteket!",`<div class="row">${a}/${b} ${input("a"+i,"small")} ${c}/${d}</div>`,"Írd be: < vagy >")}
function bigger(){let b=rnd(2,12),d=rnd(2,12),a=rnd(1,b*2),c=rnd(1,d*2);while(a*d===c*b)c=rnd(1,d*2);let i=id(),ans=a*d>c*b?`${a}/${b}`:`${c}/${d}`;return add("text",ans,"Melyik szám a nagyobb?",`<div class="row">${a}/${b} vagy ${c}/${d}? ${input("a"+i)}</div>`)}
function simplify(){let n=rnd(1,12),d=rnd(2,14),k=rnd(2,8),s=simp(n,d),i=id();return add("pair",s,"Egyszerűsítsd a törtet!",`<div class="row">${n*k}/${d*k} = ${input("n"+i,"small","number")} / ${input("d"+i,"small","number")}</div>`)}
function expand(){let n=rnd(1,9),d=rnd(2,12),k=rnd(2,7),i=id();return add("pair",[n*k,d*k],`Bővítsd a törtet ${k}-szorosára!`,`<div class="row">${n}/${d} = ${input("n"+i,"small","number")} / ${input("d"+i,"small","number")}</div>`)}
function decimal(){let ds=[2,4,5,8,10,20,25,40,50,100],d=ds[rnd(0,ds.length-1)],n=rnd(1,d*2),i=id();return add("text",String(n/d).replace(".",","),"Írd át tizedes tört alakba!",`<div class="row">${n}/${d} = ${input("a"+i)}</div>`)}
function toFraction(){let d=[10,100,1000][rnd(0,2)],n=rnd(1,d*2),s=simp(n,d),i=id();return add("pair",s,"Írd át közönséges tört alakba és egyszerűsíts!",`<div class="row">${String(n/d).replace(".",",")} = ${input("n"+i,"small","number")} / ${input("d"+i,"small","number")}</div>`)}
function mixed(){let w=rnd(1,6),d=rnd(2,10),n=rnd(1,d-1),i=id();return add("pair",[w*d+n,d],"Írd át a vegyes törtet közönséges tört alakba!",`<div class="row">${w} ${n}/${d} = ${input("n"+i,"small","number")} / ${input("d"+i,"small","number")}</div>`)}
function classify(){let bank=[()=>[String(rnd(-20,20)),"egész szám"],()=>{let d=rnd(2,8),k=rnd(2,6);return[`${d*k}/${d}`,"tört alakú egész szám"]},()=>[`${rnd(1,8)}/${rnd(9,15)}`,"tört"],()=>[`${rnd(1,5)} ${rnd(1,3)}/${rnd(4,8)}`,"vegyes tört"]],x=bank[rnd(0,3)](),i=id();return add("text",x[1],"Melyik típusba tartozik?",`<div class="row"><b>${x[0]}</b><select class="ans wide" id="a${i}"><option value="">Válassz!</option><option>egész szám</option><option>tört alakú egész szám</option><option>tört</option><option>vegyes tört</option></select></div>`)}
function finite(){let d=rnd(2,20),n=rnd(1,d-1),s=simp(n,d),x=s[1];while(x%2===0)x/=2;while(x%5===0)x/=5;let i=id();return add("text",x===1?"véges":"végtelen szakaszos","Milyen a tört tizedes tört alakja?",`<div class="row">${n}/${d}<select class="ans wide" id="a${i}"><option value="">Válassz!</option><option>véges</option><option>végtelen szakaszos</option></select></div>`)}
function truefalse(){let bank=[["Ha két pozitív tört számlálója megegyezik, a kisebb nevezőjű tört a nagyobb.","igaz"],["Ha a számlálót és a nevezőt ugyanazzal a nem nulla számmal szorozzuk, a tört értéke nem változik.","igaz"],["Két pozitív tört közül mindig a nagyobb nevezőjű a nagyobb.","hamis"],["Minden egész szám racionális szám.","igaz"],["Minden racionális szám egész szám.","hamis"],["A véges tizedes törtek racionális számok.","igaz"],["Két negatív szám közül a nullához közelebbi a nagyobb.","igaz"]],x=bank[rnd(0,bank.length-1)],i=id();return add("text",x[1],"Döntsd el: igaz vagy hamis!",`<div>${x[0]}</div><div class="row"><select class="ans medium" id="a${i}"><option value="">Válassz!</option><option>igaz</option><option>hamis</option></select></div>`)}
function between(){let a=rnd(-8,5),b=a+rnd(1,5),ans=(a+b)/2,i=id();return add("number",ans,`Írj egy racionális számot ${a} és ${b} közé!`,`<div class="row">${input("a"+i,"medium","number")}</div>`)}
function order(){let vals=[];while(vals.length<3){let d=rnd(2,10),n=rnd(-10,12),v=n/d;if(!vals.some(x=>x.v===v))vals.push({n,d,v})}let sorted=[...vals].sort((x,y)=>x.v-y.v).map(x=>`${x.n}/${x.d}`).join(" < "),i=id();return add("text",sorted,"Állítsd növekvő sorrendbe!",`<div>${vals.map(x=>`${x.n}/${x.d}`).join(" ; ")}</div><div class="row">${input("a"+i,"wide")}</div>`,"A törteket / jellel, közöttük < jellel írd.")}
const pools={easy:[compare,bigger,simplify,expand,classify],medium:[compare,simplify,decimal,toFraction,mixed,truefalse,finite],hard:[toFraction,mixed,finite,truefalse,between,order,compare],mixed:[compare,bigger,simplify,expand,decimal,toFraction,mixed,classify,finite,truefalse,between,order]};
function generate(){DATA=[];let p=pools[document.getElementById("level").value],count=document.getElementById("level").value==="hard"?10:12,html="";for(let i=0;i<count;i++)html+=p[i%p.length]();document.getElementById("tasks").innerHTML=html;document.getElementById("score").textContent="";window.scrollTo(0,0)}
function norm(x){return String(x).trim().toLowerCase().replace(/\s+/g," ").replace(/\./g,",")}
function mark(e,ok){e.classList.remove("ok","bad");e.classList.add(ok?"ok":"bad")}
function checkAll(){let score=0;DATA.forEach((q,i)=>{let ok=false;if(q.type==="pair"){let n=document.getElementById("n"+i),d=document.getElementById("d"+i);ok=Number(n.value)===q.ans[0]&&Number(d.value)===q.ans[1];mark(n,ok);mark(d,ok)}else{let e=document.getElementById("a"+i);ok=q.type==="number"?Math.abs(Number(e.value)-q.ans)<1e-9:norm(e.value)===norm(q.ans);mark(e,ok)}let f=document.getElementById("fb"+i);f.textContent=ok?" ✓ Helyes":" ✗ Javítsd!";f.style.color=ok?"green":"#c62828";if(ok)score++});document.getElementById("score").textContent=`Eredmény: ${score} / ${DATA.length}`}
generate();
</script></body></html>
